<svg viewBox="0 0 700 440" width="700" height="440" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Noto Sans TC', sans-serif">
  <rect x="1" y="1" width="698" height="438" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <defs>
    <marker id="m_dir" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="m_o" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ea580c"/></marker>
    <marker id="m_p" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/></marker>
  </defs>

  <text x="350" y="36" text-anchor="middle" font-size="14" fill="#334155" font-weight="600">SELECT：每欄 5 個元素為一組，找「各組中位數」再找「中位數的中位數」x</text>

  <!-- shaded regions (behind dots, no text on top) -->
  <rect x="308" y="74" width="262" height="112" rx="10" fill="#dbeafe" opacity="0.55"/>
  <rect x="98" y="174" width="262" height="112" rx="10" fill="#ffedd5" opacity="0.7"/>

  <!-- region tags placed in dot-free gap bands -->
  <text x="498" y="116" text-anchor="middle" font-size="12.5" fill="#2563eb" font-weight="600">這區元素 &#8805; x</text>
  <text x="180" y="250" text-anchor="middle" font-size="12.5" fill="#d97706" font-weight="600">這區元素 &#8804; x</text>

  <!-- direction indicator in the left margin only -->
  <line x1="74" y1="92" x2="74" y2="272" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#m_dir)"/>
  <text x="62" y="92" font-size="12" fill="#64748b">大</text>
  <text x="62" y="278" font-size="12" fill="#64748b">小</text>

  <!-- median row highlight box -->
  <rect x="98" y="168" width="446" height="24" rx="7" fill="none" stroke="#ea580c" stroke-width="1.6" stroke-dasharray="6 4"/>

  <!-- dots: cols x=110..530 step 70 ; rows y=90,135,180,225,270 (median=180) -->
  <g stroke="#334155">
    <g fill="#94a3b8" stroke="none">
      <circle cx="110" cy="90" r="9"/><circle cx="110" cy="135" r="9"/><circle cx="110" cy="225" r="9"/><circle cx="110" cy="270" r="9"/>
      <circle cx="180" cy="90" r="9"/><circle cx="180" cy="135" r="9"/><circle cx="180" cy="225" r="9"/><circle cx="180" cy="270" r="9"/>
      <circle cx="250" cy="90" r="9"/><circle cx="250" cy="135" r="9"/><circle cx="250" cy="225" r="9"/><circle cx="250" cy="270" r="9"/>
      <circle cx="320" cy="90" r="9"/><circle cx="320" cy="135" r="9"/><circle cx="320" cy="225" r="9"/><circle cx="320" cy="270" r="9"/>
      <circle cx="390" cy="90" r="9"/><circle cx="390" cy="135" r="9"/><circle cx="390" cy="225" r="9"/><circle cx="390" cy="270" r="9"/>
      <circle cx="460" cy="90" r="9"/><circle cx="460" cy="135" r="9"/><circle cx="460" cy="225" r="9"/><circle cx="460" cy="270" r="9"/>
      <circle cx="530" cy="90" r="9"/><circle cx="530" cy="135" r="9"/><circle cx="530" cy="225" r="9"/><circle cx="530" cy="270" r="9"/>
    </g>
    <g fill="#ffffff" stroke-width="1.6">
      <circle cx="110" cy="180" r="9"/><circle cx="180" cy="180" r="9"/><circle cx="250" cy="180" r="9"/>
      <circle cx="390" cy="180" r="9"/><circle cx="460" cy="180" r="9"/><circle cx="530" cy="180" r="9"/>
    </g>
  </g>

  <!-- median of medians x -->
  <circle cx="320" cy="180" r="14" fill="none" stroke="#7c3aed" stroke-width="2.2"/>
  <circle cx="320" cy="180" r="9" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <text x="320" y="184" font-size="11" font-style="italic" fill="#7c3aed" text-anchor="middle">x</text>

  <!-- callout 1: group medians (white dot) via clear band y=157 -->
  <path d="M530,171 L530,157 L556,157" fill="none" stroke="#ea580c" stroke-width="1.4" marker-start="url(#m_o)"/>
  <text x="560" y="161" font-size="13" fill="#ea580c" font-weight="600">每組中位數（白點）</text>

  <!-- callout 2: median of medians via clear band y=204 -->
  <path d="M320,194 L320,204 L556,204" fill="none" stroke="#7c3aed" stroke-width="1.4" marker-start="url(#m_p)"/>
  <text x="560" y="208" font-size="13" fill="#7c3aed" font-weight="600">中位數的中位數 x</text>

  <text x="350" y="330" text-anchor="middle" font-size="13" fill="#475569">至少一半的「組中位數」&#8805; x，故每組各至少 3 個元素 &#8805; x（藍區），保證能刪去夠多元素</text>
</svg>
