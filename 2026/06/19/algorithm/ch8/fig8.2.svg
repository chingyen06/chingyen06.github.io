  <g class="v"><text x="177" y="320">0</text><text x="211" y="320">0</text><text x="245" y="320">2</text><text x="279" y="320">2</text><text x="313" y="320">3</text><text x="347" y="320">3</text><text x="381" y="320">3</text><text x="415" y="320">5</text></g>

  <!-- example placement arrow A[8]=3 -> B[7], routed in the clear gap on the right -->
  <path d="M415,92 C 475,150 475,250 392,300" fill="none" stroke="#ea580c" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#c_ah)"/>
  <text x="498" y="186" font-size="12" fill="#ea580c" font-weight="600">A[8]=3</text>
  <text x="498" y="204" font-size="12" fill="#ea580c">放入 B[7]</text>
  <text x="498" y="222" font-size="12" fill="#ea580c">C[3]: 7&#8594;6</text>

  <text x="320" y="375" text-anchor="middle" font-size="12.5" fill="#475569">① 統計各值次數 &#8594; ② 前綴和（&#8804; i 的個數）&#8594; ③ 由後往前放置，相同值保持原序（穩定）</text>
</svg>
