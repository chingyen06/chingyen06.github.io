<svg viewBox="0 0 640 420" width="640" height="420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Noto Sans TC', sans-serif">
  <rect x="1" y="1" width="638" height="418" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <defs>
    <marker id="c_ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ea580c"/></marker>
  </defs>
  <style>
    .cell{fill:#f8fafc;stroke:#475569;stroke-width:1.2;}
    .v{font-size:15px;text-anchor:middle;fill:#1f2937;}
    .idx{font-size:11px;text-anchor:middle;fill:#94a3b8;}
    .lab{font-size:14px;fill:#1e3a8a;font-weight:600;}
  </style>

  <!-- A row (top=60) -->
  <text class="lab" x="148" y="80" text-anchor="end">A</text>
  <g class="idx"><text x="177" y="53">1</text><text x="211" y="53">2</text><text x="245" y="53">3</text><text x="279" y="53">4</text><text x="313" y="53">5</text><text x="347" y="53">6</text><text x="381" y="53">7</text><text x="415" y="53">8</text></g>
  <g><rect class="cell" x="160" y="60" width="34" height="30"/><rect class="cell" x="194" y="60" width="34" height="30"/><rect class="cell" x="228" y="60" width="34" height="30"/><rect class="cell" x="262" y="60" width="34" height="30"/><rect class="cell" x="296" y="60" width="34" height="30"/><rect class="cell" x="330" y="60" width="34" height="30"/><rect class="cell" x="364" y="60" width="34" height="30"/><rect class="cell" x="398" y="60" width="34" height="30"/></g>
  <g class="v"><text x="177" y="80">2</text><text x="211" y="80">5</text><text x="245" y="80">3</text><text x="279" y="80">0</text><text x="313" y="80">2</text><text x="347" y="80">3</text><text x="381" y="80">0</text><text x="415" y="80">3</text></g>

  <!-- C count row (top=140) -->
  <text class="lab" x="148" y="160" text-anchor="end">C<tspan font-size="11" fill="#64748b"> 計數</tspan></text>
  <g class="idx"><text x="177" y="133">0</text><text x="211" y="133">1</text><text x="245" y="133">2</text><text x="279" y="133">3</text><text x="313" y="133">4</text><text x="347" y="133">5</text></g>
  <g><rect class="cell" x="160" y="140" width="34" height="30"/><rect class="cell" x="194" y="140" width="34" height="30"/><rect class="cell" x="228" y="140" width="34" height="30"/><rect class="cell" x="262" y="140" width="34" height="30"/><rect class="cell" x="296" y="140" width="34" height="30"/><rect class="cell" x="330" y="140" width="34" height="30"/></g>
  <g class="v"><text x="177" y="160">2</text><text x="211" y="160">0</text><text x="245" y="160">2</text><text x="279" y="160">3</text><text x="313" y="160">0</text><text x="347" y="160">1</text></g>

  <!-- C prefix row (top=205) -->
  <text class="lab" x="148" y="225" text-anchor="end">C<tspan font-size="11" fill="#64748b"> 前綴和</tspan></text>
  <g><rect class="cell" x="160" y="205" width="34" height="30"/><rect class="cell" x="194" y="205" width="34" height="30"/><rect class="cell" x="228" y="205" width="34" height="30"/><rect class="cell" x="262" y="205" width="34" height="30"/><rect class="cell" x="296" y="205" width="34" height="30"/><rect class="cell" x="330" y="205" width="34" height="30"/></g>
  <g class="v"><text x="177" y="225">2</text><text x="211" y="225">2</text><text x="245" y="225">4</text><text x="279" y="225">7</text><text x="313" y="225">7</text><text x="347" y="225">8</text></g>

  <!-- B row (top=300), B[7] highlighted -->
  <text class="lab" x="148" y="320" text-anchor="end">B</text>
  <g class="idx"><text x="177" y="293">1</text><text x="211" y="293">2</text><text x="245" y="293">3</text><text x="279" y="293">4</text><text x="313" y="293">5</text><text x="347" y="293">6</text><text x="381" y="293">7</text><text x="415" y="293">8</text></g>
