<svg viewBox="0 0 720 430" width="720" height="430" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Noto Sans TC', sans-serif">
  <rect x="1" y="1" width="718" height="428" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <!-- highlighted sample path: root -> 2:3 -> 1:3 -> <3,1,2> -->
  <g stroke="#f59e0b" stroke-width="7" stroke-linecap="round" opacity="0.5" fill="none">
    <line x1="360" y1="55" x2="170" y2="150"/><line x1="170" y1="150" x2="260" y2="245"/><line x1="260" y1="245" x2="310" y2="335"/>
  </g>
  <!-- edges -->
  <g stroke="#94a3b8" stroke-width="1.6" fill="none">
    <line x1="360" y1="55" x2="170" y2="150"/><line x1="360" y1="55" x2="540" y2="150"/>
    <line x1="170" y1="150" x2="80" y2="245"/><line x1="170" y1="150" x2="260" y2="245"/>
    <line x1="260" y1="245" x2="210" y2="335"/><line x1="260" y1="245" x2="310" y2="335"/>
    <line x1="540" y1="150" x2="450" y2="245"/><line x1="540" y1="150" x2="630" y2="245"/>
    <line x1="630" y1="245" x2="580" y2="335"/><line x1="630" y1="245" x2="680" y2="335"/>
  </g>
  <!-- edge labels (placed beside edges, away from nodes) -->
  <g font-size="14" fill="#475569" font-style="italic">
    <text x="248" y="100">&#8804;</text><text x="460" y="100">&gt;</text>
    <text x="105" y="200">&#8804;</text><text x="228" y="200">&gt;</text>
    <text x="220" y="295">&#8804;</text><text x="300" y="295">&gt;</text>
    <text x="485" y="200">&#8804;</text><text x="600" y="200">&gt;</text>
    <text x="590" y="295">&#8804;</text><text x="670" y="295">&gt;</text>
  </g>
  <!-- internal nodes -->
  <g font-size="15" text-anchor="middle">
    <ellipse cx="360" cy="55" rx="28" ry="19" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/><text x="360" y="60" fill="#1e3a8a">1:2</text>
    <ellipse cx="170" cy="150" rx="28" ry="19" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/><text x="170" y="155" fill="#1e3a8a">2:3</text>
    <ellipse cx="540" cy="150" rx="28" ry="19" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/><text x="540" y="155" fill="#1e3a8a">1:3</text>
    <ellipse cx="260" cy="245" rx="28" ry="19" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/><text x="260" y="250" fill="#1e3a8a">1:3</text>
    <ellipse cx="630" cy="245" rx="28" ry="19" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/><text x="630" y="250" fill="#1e3a8a">2:3</text>
  </g>
  <!-- leaves -->
  <g font-size="13" text-anchor="middle" fill="#1f2937">
    <rect x="50" y="230" width="60" height="30" rx="6" fill="#f1f5f9" stroke="#64748b"/><text x="80" y="249">&#10216;1,2,3&#10217;</text>
    <rect x="180" y="320" width="60" height="30" rx="6" fill="#f1f5f9" stroke="#64748b"/><text x="210" y="339">&#10216;1,3,2&#10217;</text>
    <rect x="280" y="320" width="60" height="30" rx="6" fill="#fff7ed" stroke="#ea580c"/><text x="310" y="339">&#10216;3,1,2&#10217;</text>
    <rect x="420" y="230" width="60" height="30" rx="6" fill="#f1f5f9" stroke="#64748b"/><text x="450" y="249">&#10216;2,1,3&#10217;</text>
    <rect x="550" y="320" width="60" height="30" rx="6" fill="#f1f5f9" stroke="#64748b"/><text x="580" y="339">&#10216;2,3,1&#10217;</text>
    <rect x="650" y="320" width="60" height="30" rx="6" fill="#f1f5f9" stroke="#64748b"/><text x="680" y="339">&#10216;3,2,1&#10217;</text>
  </g>
  <!-- caption -->
  <text x="360" y="392" text-anchor="middle" font-size="12.5" fill="#475569">內部節點 i:j＝比較 a&#8338; 與 a&#8339;；葉節點＝排序結果；&#8804;／&gt; 為比較分支</text>
  <text x="360" y="412" text-anchor="middle" font-size="12.5" fill="#b45309">橘色為輸入 &#10216;6,8,5&#10217; 走過的一條路徑，最終得到 &#10216;3,1,2&#10217;</text>
</svg>
